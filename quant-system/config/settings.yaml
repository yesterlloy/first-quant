# A股因子选股量化系统配置

data:
  # 数据源配置
  source: akshare
  # 数据范围
  start_date: "20200101"  # 5年数据
  end_date: "20261231"    # 到当前

  # 数据库配置
  db_path: "/app/data/db/quant.duckdb"
  cache_path: "/app/data/cache"

  # 指数列表
  indices:
    - "000300"  # 沪深300
    - "000905"  # 中证500
    - "000001"  # 上证指数

collector:
  retry_max: 3
  retry_delay: 5  # 秒
  batch_size: 50  # 每批采集股票数

backtest:
  initial_capital: 1000000  # 100万
  commission: 0.001         # 0.1%手续费
  slippage: 0.0005          # 0.05%滑点

dashboard:
  port: 8050
  host: "0.0.0.0"
  debug: false

logging:
  level: INFO
  path: "/app/logs"